<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>الصفحة غير موجودة — كيك العرب</title>
<meta name="theme-color" content="#5A3826" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Tajawal",sans-serif;background:#5A3826;color:#F6ECDF;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .wrap{max-width:480px}
  .mark{width:64px;height:64px;border-radius:16px;background:#3F2718;color:#E8B84B;font-family:"El Messiri",sans-serif;font-weight:700;font-size:1.5rem;display:grid;place-items:center;margin:0 auto 24px}
  h1{font-family:"El Messiri",sans-serif;font-size:4.5rem;color:#E8B84B;line-height:1}
  h2{font-family:"El Messiri",sans-serif;font-size:1.6rem;margin:8px 0 14px}
  p{color:#e3d4c4;margin-bottom:28px}
  a{display:inline-block;background:#C24E6B;color:#fff;text-decoration:none;font-weight:700;padding:13px 30px;border-radius:999px;transition:transform .2s,background .2s}
  a:hover{background:#A53C56;transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">CA</div>
    <h1>404</h1>
    <h2>هذي الصفحة مو موجودة</h2>
    <p>يبدو أن الرابط غير صحيح أو تم نقل الصفحة. ارجع للرئيسية وكمّل تصفّح أصنافنا.</p>
    <a href="index.html">العودة للرئيسية</a>
  </div>
</body>
</html>
